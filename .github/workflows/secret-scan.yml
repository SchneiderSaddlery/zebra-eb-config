name: Secret Scan

# Self-contained gitleaks secret scan. This PUBLIC repo cannot call the org's
# reusable secret-scan workflow because that workflow lives in a PRIVATE repo
# (org-reusable-workflows), and GitHub does not allow public repos to call
# reusable workflows from private repos. So the same logic is inlined here.
# Keep in sync with org-reusable-workflows/.github/workflows/secret-scan.yml.

on:
  push:
  pull_request:

permissions:
  contents: read
  # pull-requests: read is required on pull_request events: gitleaks reads the PR
  # commit list (GET /repos/.../pulls/{n}/commits), which 403s with contents: read
  # alone. Comments are disabled below, so read (not write) is sufficient.
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # Skip Dependabot-triggered runs: GitHub runs them against the read-only
    # Dependabot secret store, so GITLEAKS_LICENSE resolves empty and the action
    # fails with "missing gitleaks license". Those PRs only bump manifests and the
    # merge commit is push-scanned on the base branch anyway.
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: false
