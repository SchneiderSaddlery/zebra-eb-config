<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sstack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
            color: #333333;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #ffffff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e0e6eb;
        }

        header img {
            max-width: 160px;
            height: auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #555;
        }

        .user-name {
            font-weight: 500;
            color: #333;
        }

        .sign-out-btn {
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #007bad;
            background: none;
            border: 1px solid #007bad;
            padding: 6px 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .sign-out-btn:active {
            background-color: #007bad;
            color: #ffffff;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            gap: 16px;
        }

        .app-btn {
            display: block;
            width: 100%;
            max-width: 640px;
            padding: 16px 24px;
            font-family: 'Roboto', sans-serif;
            font-size: 18px;
            font-weight: 400;
            text-align: center;
            text-decoration: none;
            color: #ffffff;
            background-color: #007bad;
            border: 1px solid #007bad;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .app-btn:active {
            background-color: #005a80;
            border-color: #005a80;
        }

        /* Sign-in screen */
        #sign-in-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            gap: 24px;
        }

        #sign-in-screen img {
            max-width: 240px;
            height: auto;
        }

        .sign-in-btn {
            display: block;
            width: 100%;
            max-width: 640px;
            padding: 18px 24px;
            font-family: 'Roboto', sans-serif;
            font-size: 18px;
            font-weight: 500;
            text-align: center;
            color: #ffffff;
            background-color: #007bad;
            border: 1px solid #007bad;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .sign-in-btn:active {
            background-color: #005a80;
            border-color: #005a80;
        }

        .sign-in-btn:disabled {
            background-color: #999;
            border-color: #999;
        }

        #debug-status {
            font-size: 11px;
            color: #999;
            text-align: center;
            padding: 8px;
            max-width: 640px;
            word-break: break-all;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Sign-in screen (visible by default so page is never blank) -->
    <div id="sign-in-screen">
        <img src="ss-logo.png" alt="Schneiders logo">
        <button class="sign-in-btn" id="sign-in-btn" disabled onclick="signIn()">Loading...</button>
        <div id="debug-status"></div>
    </div>

    <!-- Authenticated view -->
    <div id="app-view" class="hidden">
        <header>
            <img src="ss-logo.png" alt="Schneiders logo">
            <div class="user-info">
                <span class="user-name" id="user-display-name"></span>
                <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
            </div>
        </header>
        <main>
            <a href="https://fulfillment.aws-prod.sstack.com/app-list" class="app-btn">Custom Apps</a>
            <a href="https://sstack.fulfil.io/client/" class="app-btn">Fulfil WMS</a>
        </main>
    </div>

    <script>
        // --- Configuration ---
        var MSAL_CONFIG = {
            auth: {
                clientId: 'fd1afd85-d619-46c6-b7ef-3bf261086e65',
                authority: 'https://login.microsoftonline.com/2df558ec-e934-42b4-b689-fbec5a992751',
                redirectUri: window.location.origin + window.location.pathname
            },
            cache: {
                cacheLocation: 'sessionStorage'
            }
        };

        var LOGIN_SCOPES = { scopes: ['User.Read'] };
        var INACTIVITY_TIMEOUT = 30 * 60 * 1000; // 30 minutes
        var TEAMS_WEBHOOK_URL = ''; // Set after creating webhook

        // --- State ---
        var msalInstance = null;
        var msalReady = false;
        var inactivityTimer = null;

        // --- Debug status (visible on page for troubleshooting) ---
        function setStatus(msg) {
            var el = document.getElementById('debug-status');
            if (el) el.textContent = msg;
            console.log('[ScannerLogin] ' + msg);
        }

        // --- Device identification via Fully Kiosk JS API ---
        function getDeviceName() {
            try {
                if (typeof fully !== 'undefined') {
                    var hostname = fully.getHostname && fully.getHostname();
                    if (hostname) return hostname;
                    var ip = fully.getIp4Address && fully.getIp4Address();
                    if (ip) return ip;
                    var mac = fully.getMacAddress && fully.getMacAddress();
                    if (mac) return mac;
                }
            } catch (e) { /* not in Fully Kiosk */ }
            var stored = localStorage.getItem('deviceName');
            if (stored) return stored;
            return 'Unknown Device';
        }

        // --- Inactivity auto-logout ---
        function resetInactivityTimer() {
            if (inactivityTimer) clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(function() {
                signOut();
            }, INACTIVITY_TIMEOUT);
        }

        function startInactivityTracking() {
            var events = ['touchstart', 'click', 'scroll', 'keydown'];
            events.forEach(function(evt) {
                document.addEventListener(evt, resetInactivityTimer, { passive: true });
            });
            resetInactivityTimer();
        }

        function stopInactivityTracking() {
            if (inactivityTimer) clearTimeout(inactivityTimer);
            var events = ['touchstart', 'click', 'scroll', 'keydown'];
            events.forEach(function(evt) {
                document.removeEventListener(evt, resetInactivityTimer);
            });
        }

        // --- Teams webhook ---
        function notifyTeams(userName, deviceName) {
            if (!TEAMS_WEBHOOK_URL) return;
            var now = new Date();
            var time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            var date = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            var message = userName + ' signed into ' + deviceName + ' at ' + time + ' (' + date + ')';

            fetch(TEAMS_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    '@type': 'MessageCard',
                    summary: 'Scanner Login',
                    text: message
                })
            }).catch(function() { /* silent fail */ });
        }

        // --- UI updates ---
        function showSignIn() {
            document.getElementById('sign-in-screen').classList.remove('hidden');
            document.getElementById('app-view').classList.add('hidden');
        }

        function enableSignInButton() {
            var btn = document.getElementById('sign-in-btn');
            btn.disabled = false;
            btn.textContent = 'Sign In with Microsoft';
        }

        function showApp(displayName) {
            document.getElementById('user-display-name').textContent = displayName;
            document.getElementById('sign-in-screen').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            startInactivityTracking();
        }

        // --- MSAL auth ---

        // Check if URL has an auth redirect hash but no matching MSAL state in sessionStorage
        function hasOrphanedHash() {
            if (location.hash.indexOf('code=') === -1) return false;
            // Look for MSAL interaction-in-progress key
            for (var i = 0; i < sessionStorage.length; i++) {
                var key = sessionStorage.key(i);
                if (key && key.indexOf('msal.') === 0 && key.indexOf('.interaction') !== -1) {
                    return false; // Found matching state — not orphaned
                }
            }
            return true; // Hash present but no MSAL state
        }

        function stripHash() {
            history.replaceState(null, '', window.location.pathname);
        }

        async function initMsal() {
            try {
                setStatus('Loading...');

                if (typeof msal === 'undefined') {
                    setStatus('ERROR: MSAL library failed to load');
                    enableSignInButton();
                    return;
                }

                // Strip orphaned auth hash BEFORE MSAL sees it
                if (hasOrphanedHash()) {
                    setStatus('Clearing stale session...');
                    sessionStorage.clear();
                    stripHash();
                }

                msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
                await msalInstance.initialize();
                setStatus('Checking session...');

                // Handle redirect response with a 5-second timeout safety net
                var response = null;
                if (location.hash && location.hash.indexOf('code=') !== -1) {
                    response = await Promise.race([
                        msalInstance.handleRedirectPromise(),
                        new Promise(function(resolve) {
                            setTimeout(function() {
                                setStatus('Login timed out — try again');
                                resolve(null);
                            }, 5000);
                        })
                    ]);
                } else {
                    response = await msalInstance.handleRedirectPromise();
                }

                if (response && response.account) {
                    setStatus('Welcome ' + response.account.name);
                    onSignInSuccess(response.account);
                    return;
                }

                // If hash is still present after handleRedirectPromise, strip it
                if (location.hash) stripHash();

                // Check for existing session
                var accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    setStatus('Validating session...');
                    try {
                        await msalInstance.acquireTokenSilent({
                            scopes: ['User.Read'],
                            account: accounts[0]
                        });
                        setStatus('Welcome back ' + accounts[0].name);
                        onSignInSuccess(accounts[0]);
                    } catch (e) {
                        setStatus('Session expired');
                        msalReady = true;
                        enableSignInButton();
                    }
                    return;
                }

                // No session — show sign-in
                msalReady = true;
                setStatus('');
                enableSignInButton();
            } catch (e) {
                setStatus('Init error: ' + e.message);
                enableSignInButton();
            }
        }

        function onSignInSuccess(account) {
            var displayName = account.name || account.username;
            showApp(displayName);
            notifyTeams(displayName, getDeviceName());
        }

        async function signIn() {
            if (!msalInstance) {
                setStatus('Not ready — please wait');
                return;
            }
            try {
                setStatus('Redirecting to Microsoft...');
                document.getElementById('sign-in-btn').disabled = true;
                await msalInstance.loginRedirect(LOGIN_SCOPES);
            } catch (e) {
                setStatus('Sign-in error: ' + e.message);
                document.getElementById('sign-in-btn').disabled = false;
            }
        }

        function signOut() {
            stopInactivityTracking();
            // Clear MSAL session tokens — do NOT call logoutRedirect
            // which would clear Microsoft SSO cookies and break Custom Apps auth
            sessionStorage.clear();
            // Reload to clean URL (no hash) so MSAL initializes fresh
            window.location.replace(window.location.origin + window.location.pathname);
        }

        // --- Init ---
        initMsal();
    </script>
</body>
</html>
